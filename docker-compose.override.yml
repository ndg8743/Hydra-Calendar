version: '3.8'

services:
  app:
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:80"

  db:
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: hydra_calendar_dev
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password

  # Add Redis for caching in development
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - hydra-network

  # Add Mailpit for email testing
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - hydra-network
